            - text: Database Memory Service for ADK
            - link "¶" [ref=e750] [cursor=pointer]:
              - /url: https://adk.dev/integrations/database-memory/#database-memory-service-for-adk
          - generic [ref=e751]:
            - generic [ref=e752]: Supported in ADK
            - generic [ref=e753]: Python
          - paragraph [ref=e754]:
            - link "adk-database-memory" [ref=e755] [cursor=pointer]:
              - /url: https://github.com/anmolg1997/adk-database-memory
              - code [ref=e756]: adk-database-memory
            - text: is a drop-in persistent
            - code [ref=e757]: BaseMemoryService
            - text: "for ADK Python, backed by async SQLAlchemy. This integration provides persistent cross-session memory for ADK agents using your own database: use SQLite for development, or Postgres / MySQL for production."
          - heading "Use cases ¶" [level=2] [ref=e758]:
            - text: Use cases
            - link "¶" [ref=e759] [cursor=pointer]:
              - /url: https://adk.dev/integrations/database-memory/#use-cases
          - list [ref=e760]:
            - listitem [ref=e761]:
              - strong [ref=e762]: Personalized assistants
              - text: ": Accumulate long-term user preferences, facts, and past decisions across sessions so the agent can recall them on demand."
            - listitem [ref=e763]:
              - strong [ref=e764]: Support and task agents
              - text: ": Persist conversation history across tickets and devices, so context is available whenever the user returns."
            - listitem [ref=e765]:
              - strong [ref=e766]: Self-hosted deployments
              - text: ": When Vertex AI Memory Bank is not an option (on-prem, air-gapped, non-GCP cloud), keep memory on the database you already use."
            - listitem [ref=e767]:
              - strong [ref=e768]: Local development
              - text: ": Drop in SQLite for zero-config persistent memory that survives restarts, then flip the connection string to Postgres in production."
          - heading "Prerequisites ¶" [level=2] [ref=e769]:
            - text: Prerequisites
            - link "¶" [ref=e770] [cursor=pointer]:
              - /url: https://adk.dev/integrations/database-memory/#prerequisites
          - list [ref=e771]:
            - listitem [ref=e772]: Python 3.10 or later
            - listitem [ref=e773]: "A supported database: SQLite, PostgreSQL, or MySQL / MariaDB"
          - heading "Installation ¶" [level=2] [ref=e774]:
            - text: Installation
            - link "¶" [ref=e775] [cursor=pointer]:
              - /url: https://adk.dev/integrations/database-memory/#installation
          - paragraph [ref=e776]: "Install the package together with the driver for your database:"
          - generic [ref=e778]:
            - navigation [ref=e779]:
              - button "Copy to clipboard" [ref=e780] [cursor=pointer]
            - code [ref=e781]:
              - generic [ref=e782]: "pip install \"adk-database-memory[sqlite]\" # SQLite (via aiosqlite)"
              - generic [ref=e783]: "pip install \"adk-database-memory[postgres]\" # PostgreSQL (via asyncpg)"
              - generic [ref=e784]: "pip install \"adk-database-memory[mysql]\" # MySQL / MariaDB (via aiomysql)"
          - paragraph [ref=e785]: The core package does not include any database drivers. Choose the extra that matches your backend, or install your own async driver separately.
          - heading "Use with agent ¶" [level=2] [ref=e786]:
