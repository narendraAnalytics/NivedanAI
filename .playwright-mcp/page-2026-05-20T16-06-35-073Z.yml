          - paragraph [ref=e788]:
            - text: The service implements
            - code [ref=e789]: google.adk.memory.base_memory_service.BaseMemoryService
            - text: ", so it slots into any ADK"
            - code [ref=e790]: Runner
            - text: that accepts a
