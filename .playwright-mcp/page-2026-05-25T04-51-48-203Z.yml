            - paragraph [ref=e759]:
              - text: The
              - strong [ref=e760]:
                - emphasis [ref=e761]: SequentialAgent
              - text: class is a
              - link "template workflow" [ref=e762] [cursor=pointer]:
                - /url: https://adk.dev/agents/workflow-agents/
              - text: agent that executes its sub-agents in the order they are specified in a list. Use
              - strong [ref=e763]:
                - emphasis [ref=e764]: SequentialAgent
              - text: when you want execution to occur in a fixed, strict order. As with other templated workflows, the execution of a
              - strong [ref=e765]:
                - emphasis [ref=e766]: SequentialAgent
              - text: object is not controlled by an AI model, and is deterministic in how it executes its sub-agents. The sub-agents specified in the sequential execution set may or may not utilize AI models, but the overall execution of those sub-agents is ultimately managed by the
              - strong [ref=e767]:
                - emphasis [ref=e768]: SequentialAgent
              - text: object you define.
            - generic [ref=e769]:
