            - listitem [ref=e226]: Resumable uploads are now supported
            - listitem [ref=e227]: We've re-architected the backend to require less round-trips to the UploadThing server, take advantage of modern web advancements, and removed all polling logic. All of these changes results in a much faster upload experience.
            - listitem [ref=e228]: We've begun work on a self-hosted version of UploadThing (more info coming soon)
